services:
  db:
    image: postgres:16
    container_name: jit-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?Set POSTGRES_USER in .env}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-jit_db}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - jit_data:/var/lib/postgresql/data

volumes:
  jit_data:
