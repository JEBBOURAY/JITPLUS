<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src 'self' http://localhost:3000 https://*.jitplus.app https://*.jitplus.ma; img-src 'self' data: https://storage.googleapis.com blob:; font-src 'self' data:; frame-src 'none'; object-src 'none'; base-uri 'self';" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JitPlus — Admin</title>
    <style>
      :root {
        --theme-bg: #F8FAFC;
        --theme-surface: #FFFFFF;
        --theme-surface-hover: #F1F5F9;
        --theme-border: #E2E8F0;
        --theme-text: #0F172A;
        --theme-text-muted: #64748B;
        --theme-primary: #7C3AED;
        --theme-primary-light: #8B5CF6;
        --theme-cyan: #06B6D4;
        --theme-green: #10B981;
        --theme-red: #EF4444;
        --theme-amber: #F59E0B;
        --theme-blue: #3b82f6;

        --theme-primary-alpha: rgba(124, 58, 237, 0.15);
        --theme-green-alpha: rgba(16, 185, 129, 0.15);
        --theme-red-alpha: rgba(239, 68, 68, 0.15);
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --theme-bg: #0B0F14;
          --theme-surface: #1A1F2B;
          --theme-surface-hover: #2D3443;
          --theme-border: rgba(255,255,255,0.10);
          --theme-text: #F1F5F9;
          --theme-text-muted: #9CA3AF;
          --theme-primary: #A78BFA;
          --theme-primary-light: #C4B5FD;
          --theme-cyan: #22d3ee;
          --theme-green: #34D399;
          --theme-red: #F87171;
          --theme-amber: #FBBF24;
          --theme-blue: #60a5fa;

          --theme-primary-alpha: rgba(167, 139, 250, 0.15);
          --theme-green-alpha: rgba(52, 211, 153, 0.15);
          --theme-red-alpha: rgba(248, 113, 113, 0.15);
        }
      }
      *, *::before, *::after { box-sizing: border-box; }
      body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif, 'Apple Color Emoji', 'Segoe UI Emoji', 'Segoe UI Symbol'; background: var(--theme-bg); color: var(--theme-text); }
      #root { min-height: 100vh; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
