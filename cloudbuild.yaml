# ══════════════════════════════════════════════════════════════════════════════
#  JitPlus — Cloud Build CI/CD Pipeline
#  Déployé sur : Cloud Run (backend) + Cloud SQL + Cloud Storage + Secret Manager
#
#  Prérequis :
#    1. Artifact Registry repo créé : gcloud artifacts repositories create jitplus \
#         --repository-format=docker --location=europe-west1
#    2. Cloud SQL instance PostgreSQL créée
#    3. Secrets créés dans Secret Manager (voir liste ci-dessous)
#    4. Compte de service Cloud Build avec les rôles :
#         - Cloud Run Admin
#         - Cloud SQL Client
#         - Artifact Registry Writer
#         - Secret Manager Secret Accessor
#
#  Secrets requis dans Secret Manager (créer avec gcloud secrets create) :
#    - DATABASE_URL
#    - JWT_SECRET
#    - QR_HMAC_SECRET
#    - SENTRY_DSN
#    - CORS_ORIGINS
#    - BACKEND_URL
#    - FIREBASE_CLIENT_EMAIL
#    - FIREBASE_PRIVATE_KEY
#    - GOOGLE_CLIENT_ID
#    - RESEND_API_KEY
#    - TWILIO_ACCOUNT_SID
#    - TWILIO_AUTH_TOKEN
#    - TWILIO_WHATSAPP_FROM
#    - TWILIO_OTP_CONTENT_SID
#    - SMTP_HOST / SMTP_PORT / SMTP_USER / SMTP_PASS / SMTP_FROM
#
#  Variables de substitution à personnaliser :
#    _REGION, _SERVICE_NAME, _CLOUD_SQL_INSTANCE, _AR_REPO
# ══════════════════════════════════════════════════════════════════════════════

substitutions:
  _REGION: europe-west9
  _SERVICE_NAME: jitplus-api
  _AR_REPO: jitplus
  _CLOUD_SQL_INSTANCE: jitplus-97259:europe-west9:jitplus-db
  _IMAGE: ${_REGION}-docker.pkg.dev/jitplus-97259/${_AR_REPO}/backend

steps:
  # ── 1. Build the Docker image ───────────────────────────────────────────────
  - name: gcr.io/cloud-builders/docker
    id: build
    env:
      - DOCKER_BUILDKIT=1
    args:
      - build
      - --pull
      - --tag=$_IMAGE:$COMMIT_SHA
      - --tag=$_IMAGE:latest
      - --cache-from=$_IMAGE:latest
      - --file=apps/backend/Dockerfile
      - .
    waitFor: ['-']

  # ── 2. Push the image to Artifact Registry ──────────────────────────────────
  - name: gcr.io/cloud-builders/docker
    id: push
    args:
      - push
      - --all-tags
      - $_IMAGE
    waitFor: [build]

  # ── 3. Run database migrations (Cloud Run Job — one-off) ───────────────────
  #  Crée ou met à jour un Cloud Run Job "jitplus-migrate" puis l'exécute.
  #  Le job utilise l'entrypoint.sh avec SKIP_MIGRATIONS=0 pour lancer migrate deploy.
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: deploy-migrate-job
    entrypoint: gcloud
    args:
      - run
      - jobs
      - deploy
      - jitplus-migrate
      - --image=$_IMAGE:$COMMIT_SHA
      - --region=$_REGION
      - --set-cloudsql-instances=$_CLOUD_SQL_INSTANCE
      - --set-env-vars=NODE_ENV=production,SKIP_MIGRATIONS=0,GCP_PROJECT_ID=${PROJECT_ID},GCP_STORAGE_BUCKET_NAME=jitplus-uploads-prod
      - --set-secrets=DATABASE_URL=DATABASE_URL:latest,JWT_SECRET=JWT_SECRET:latest,DIRECT_DATABASE_URL=DATABASE_URL:latest,ADMIN_PASSWORD=ADMIN_PASSWORD:latest
      - --command=/app/docker-entrypoint.sh
      - --args=echo,migrations-complete
      - --task-timeout=300s
      - --max-retries=0
    waitFor: [push]

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: run-migrations
    entrypoint: gcloud
    args:
      - run
      - jobs
      - execute
      - jitplus-migrate
      - --region=$_REGION
      - --wait
    waitFor: [deploy-migrate-job]

  # ── 4. Deploy the Cloud Run service ─────────────────────────────────────────
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: deploy-service
    entrypoint: gcloud
    args:
      - run
      - deploy
      - $_SERVICE_NAME
      - --image=$_IMAGE:$COMMIT_SHA
      - --region=$_REGION
      - --platform=managed
      - --allow-unauthenticated
      - --port=3000
      - --min-instances=0
      - --max-instances=10
      - --concurrency=80
      - --memory=512Mi
      - --cpu=1
      - --cpu-boost
      - --execution-environment=gen2
      - --set-cloudsql-instances=$_CLOUD_SQL_INSTANCE
      - --set-env-vars=^;;^NODE_ENV=production;;SKIP_MIGRATIONS=1;;GCP_PROJECT_ID=${PROJECT_ID};;GCP_STORAGE_BUCKET_NAME=jitplus-uploads-prod;;FIREBASE_PROJECT_ID=jitplus-97259;;MODERATION_EMAIL=contact@jitplus.com;;GOOGLE_CLIENT_ID=290470991104-71koh2ac0h2ai8tppb5t8bsnmoo9mdtj.apps.googleusercontent.com;;GOOGLE_ANDROID_CLIENT_ID=290470991104-5av1uiocig1l5k2rfq9ehb9ui5vb9oj9.apps.googleusercontent.com,290470991104-rcumid1oof1j80luvo62n05rc7or4ve9.apps.googleusercontent.com
      - --set-secrets=DATABASE_URL=DATABASE_URL:latest,JWT_SECRET=JWT_SECRET:latest,QR_HMAC_SECRET=QR_HMAC_SECRET:latest,SENTRY_DSN=SENTRY_DSN:latest,CORS_ORIGINS=CORS_ORIGINS:latest,BACKEND_URL=BACKEND_URL:latest,RESEND_API_KEY=RESEND_API_KEY:latest,FIREBASE_CLIENT_EMAIL=FIREBASE_CLIENT_EMAIL:latest,FIREBASE_PRIVATE_KEY=FIREBASE_PRIVATE_KEY:latest,TWILIO_ACCOUNT_SID=TWILIO_ACCOUNT_SID:latest,TWILIO_AUTH_TOKEN=TWILIO_AUTH_TOKEN:latest,TWILIO_WHATSAPP_FROM=TWILIO_WHATSAPP_FROM:latest,TWILIO_OTP_CONTENT_SID=TWILIO_OTP_CONTENT_SID:latest,SMTP_HOST=SMTP_HOST:latest,SMTP_PORT=SMTP_PORT:latest,SMTP_USER=SMTP_USER:latest,SMTP_PASS=SMTP_PASS:latest,SMTP_FROM=SMTP_FROM:latest,GOOGLE_MAPS_API_KEY=GOOGLE_MAPS_API_KEY:latest
    waitFor: [run-migrations]

images:
  - $_IMAGE:$COMMIT_SHA
  - $_IMAGE:latest

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_MEDIUM
